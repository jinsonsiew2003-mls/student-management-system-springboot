version: "3.8"

services: 
  mysql: 
    image: mysql:8.0
    container_name: mysql-db
    restart:  always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student-db 
    ports: 
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  
  app:
    build: .
    container_name: student-management-app
    ports:
      - "9090:8080"

    
volumes:
      mysql_data:
